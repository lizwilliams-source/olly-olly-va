<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olly Olly Virtual Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">⚡</div>
        <h1>Olly Olly</h1>
        <p>Virtual Assistant</p>
      </div>
      <div id="clerk-sign-in"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app-screen" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Olly Olly</h1>
      <p>Virtual Assistant</p>
    </div>

    <span class="nav-section-label">Overview</span>
    <div class="nav-item active" data-view="dashboard">
      <span class="icon">⚡</span> Dashboard
    </div>
    <div class="nav-item" data-view="callqueue">
      <span class="icon">📞</span> Call Queue
      <span class="nav-badge" id="call-badge">0</span>
    </div>
    <div class="nav-item" data-view="followups">
      <span class="icon">🔔</span> Follow-ups
      <span class="nav-badge" id="followup-badge">0</span>
    </div>

    <span class="nav-section-label">Companies</span>
    <div class="nav-item" data-view="contacts">
      <span class="icon">🏢</span> My Companies
    </div>
    <div class="nav-item" data-view="pipeline">
      <span class="icon">📊</span> Pipeline
    </div>

    <span class="nav-section-label">Tools</span>
    <div class="nav-item" data-view="ai">
      <span class="icon">✨</span> AI Assistant
    </div>
    <div class="nav-item" data-view="coaching">
      <span class="icon">🎯</span> Sales Coaching
    </div>

    <div class="sidebar-footer">
      <div class="user-info" id="user-info"></div>
      <div class="hs-status">
        <div class="hs-dot" id="hs-dot"></div>
        <span id="hs-status-text">Connecting...</span>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="signOut()">Sign out</button>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
  // Load Clerk then boot the app
  const clerkScript = document.createElement('script');
  clerkScript.src = 'https://wise-panda-20.clerk.accounts.dev';
  clerkScript.onload = function() {
    const appScript = document.createElement('script');
    appScript.src = 'app.js';
    document.body.appendChild(appScript);
  };
  document.body.appendChild(clerkScript);
</script>

</body>
</html>
